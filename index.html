<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>InPost APM - Vacaciones de verano 2026</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Arabic',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
.card{width:100%;max-width:480px;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.header{background:#FFD100;padding:20px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.header-brand{display:flex;flex-direction:column;gap:2px}
.header-logo{font-weight:800;font-size:26px;color:#1a1a1a;letter-spacing:-0.03em;line-height:1}
.header-sub{font-size:13px;color:#333;font-weight:500;line-height:1.2}
[dir=rtl] .header-sub{text-align:right}
.body{padding:24px 20px;flex:1;display:flex;flex-direction:column}
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.lang-btn{padding:10px 4px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#555;font-family:inherit;text-align:center}
.lang-btn.active{background:#FFF9C4;border-color:#F9A825;color:#1a1a1a}
.section-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.section-sub{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5}
.input-field{width:100%;padding:14px;border-radius:10px;border:1.5px solid #ddd;font-size:16px;color:#1a1a1a;font-family:inherit;background:#fff;margin-bottom:16px}
.input-field:focus{outline:none;border-color:#FFD100;box-shadow:0 0 0 3px rgba(255,209,0,.2)}
.btn-primary{width:100%;padding:16px;border-radius:10px;border:none;background:#FFD100;color:#1a1a1a;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-secondary{width:100%;padding:13px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;margin-bottom:8px}
.error{color:#c62828;font-size:13px;padding:10px 14px;background:#FFEBEE;border-radius:8px;line-height:1.5;display:none;margin-bottom:16px}
.point-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.point-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;border:1.5px solid #e0e0e0}
.point-info{flex:1;min-width:0}
.point-name{font-weight:600;font-size:14px;color:#1a1a1a;margin-bottom:2px}
.point-addr{font-size:12px;color:#888;line-height:1.4}
.point-num{width:28px;height:28px;border-radius:50%;background:#FFD100;color:#1a1a1a;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.progress-bar{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.progress-dot{width:10px;height:10px;border-radius:50%;background:#e0e0e0;flex-shrink:0}
.progress-dot.done{background:#2E7D32}
.progress-dot.current{background:#FFD100;box-shadow:0 0 0 3px rgba(255,209,0,.3)}
.progress-label{font-size:12px;color:#888;margin-left:8px}
[dir=rtl] .progress-label{margin-left:0;margin-right:8px}
.point-header{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.point-subheader{font-size:13px;color:#888;margin-bottom:20px}
.main-question{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:16px;line-height:1.3}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.btn-opt{width:100%;padding:18px 16px;border-radius:12px;border:2px solid transparent;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.btn-opt.close{background:#FFEBEE;border-color:#FFCDD2;color:#C62828}
.btn-opt.close.active{background:#FFCDD2;border-color:#C62828;box-shadow:0 0 0 3px rgba(198,40,40,.15)}
.btn-opt.open{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32}
.btn-opt.open.active{background:#C8E6C9;border-color:#2E7D32;box-shadow:0 0 0 3px rgba(46,125,50,.15)}
.btn-opt.unsure{background:#FFFDE7;border-color:#FFF176;color:#E65100}
.btn-opt.unsure.active{background:#FFF9C4;border-color:#F9A825;box-shadow:0 0 0 3px rgba(249,168,37,.2)}
.sub-question{background:#f7f7f7;border-radius:12px;padding:16px;margin-bottom:20px;display:none}
.sub-question-label{font-size:14px;font-weight:600;color:#444;margin-bottom:12px;display:block}
.sub-options{display:flex;flex-direction:column;gap:8px}
.btn-sub{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;color:#444}
.btn-sub.active{border-color:#2E7D32;background:#E8F5E9;color:#2E7D32;font-weight:600}
.schedule-block{background:#EDE7F6;border-radius:12px;padding:16px;margin-top:12px;display:none;flex-direction:column;gap:14px;border-left:3px solid #7E57C2}
[dir=rtl] .schedule-block{border-left:none;border-right:3px solid #7E57C2}
.sched-label{font-size:12px;font-weight:700;color:#512DA8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.time-row{display:flex;align-items:center;gap:8px}
.time-lbl{font-size:13px;color:#555;flex-shrink:0}
.time-input{flex:1;padding:11px 12px;border-radius:8px;border:1.5px solid #ddd;font-size:16px;font-family:inherit;background:#fff;color:#1a1a1a;min-width:0}
.time-input:focus{outline:none;border-color:#7E57C2}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.date-col label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
.date-col input[type=date]{width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid #ddd;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a}
.date-col input[type=date]:focus{outline:none;border-color:#7E57C2}
.siesta-btns{display:flex;gap:8px}
.btn-siesta{flex:1;padding:11px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;color:#555;transition:all .15s}
.btn-siesta.active{border-color:#7E57C2;background:#EDE7F6;color:#512DA8}
.periods{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.period-block{background:#f7f7f7;border-radius:10px;padding:16px;position:relative}
.period-block-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:10px;display:block}
.period-block label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500;margin-top:10px}
.period-block label:first-of-type{margin-top:0}
.period-block input[type=date]{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:16px;font-family:inherit;color:#1a1a1a}
.period-block input[type=date]:focus{outline:none;border-color:#FFD100}
.btn-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:2px 8px;line-height:1;border-radius:4px;font-family:inherit}
[dir=rtl] .btn-remove{right:auto;left:10px}
.btn-remove:hover{color:#e53935}
.btn-add{width:100%;padding:12px;border-radius:10px;border:2px dashed #ddd;background:#fff;font-size:13px;font-weight:600;color:#888;cursor:pointer;margin-bottom:20px;font-family:inherit}
.btn-add:hover{border-color:#FFD100}
.unsure-note{background:#FFF8E1;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:none;font-size:13px;color:#E65100;line-height:1.6;border-left:3px solid #F9A825}
[dir=rtl] .unsure-note{border-left:none;border-right:3px solid #F9A825}
.edit-notice{background:#E3F2FD;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#1565C0;border-left:3px solid #1565C0}
[dir=rtl] .edit-notice{border-left:none;border-right:3px solid #1565C0}
.modif-notice{background:#FFF3E0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#E65100;border-left:3px solid #FF9800}
[dir=rtl] .modif-notice{border-left:none;border-right:3px solid #FF9800}
.summary-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.summary-item{border-radius:10px;padding:14px 16px;border:1.5px solid #e0e0e0}
.summary-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.summary-item-name{font-weight:600;font-size:14px;color:#1a1a1a}
.summary-item-city{font-size:12px;color:#888;margin-bottom:8px}
.summary-item-detail{font-size:13px;color:#444;line-height:1.7;margin-top:6px}
.chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.chip-red{background:#FFEBEE;color:#C62828}
.chip-green{background:#E8F5E9;color:#2E7D32}
.chip-purple{background:#EDE7F6;color:#512DA8}
.chip-yellow{background:#FFFDE7;color:#E65100}
.success-icon{width:64px;height:64px;border-radius:50%;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:28px;color:#2E7D32;margin:0 auto 16px}
.footer{padding:16px 20px;text-align:center;font-size:11px;color:#ccc;flex-shrink:0}
.test-badge{display:inline-block;background:#FFF9C4;color:#F57F17;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:16px}

</style>
</head>

  if(idx>0){var btnBack=el('button','btn-secondary',t('back'));btnBack.addEventListener('click',function(){showForm(idx-1);});app.appendChild(btnBack);}

  var state=null;
  function resetBtns(){[btnC,btnO,btnU].forEach(function(b){b.classList.remove('active');});}

  btnC.addEventListener('click',function(){
    resetBtns();btnC.classList.add('active');state='close';
    periodsEl.innerHTML='';if(!periodsEl.children.length)addPeriod('','');
    periodsWrap.style.display='block';unsureNote.style.display='none';
    btnSub.style.display='block';errEl.style.display='none';
  });
  btnO.addEventListener('click',function(){
    resetBtns();btnO.classList.add('active');state='open';
    periodsWrap.style.display='none';unsureNote.style.display='none';
    btnSub.style.display='block';errEl.style.display='none';
  });
  btnU.addEventListener('click',function(){
    resetBtns();btnU.classList.add('active');state='unsure';
    periodsWrap.style.display='none';unsureNote.style.display='block';
    btnSub.style.display='block';errEl.style.display='none';
  });

  if(prev){
    state=prev.state;
    if(state==='close'){btnC.classList.add('active');(prev.periods||[{start:'',end:''}]).forEach(function(p){addPeriod(p.start,p.end);});periodsWrap.style.display='block';btnSub.style.display='block';}
    else if(state==='open'){btnO.classList.add('active');btnSub.style.display='block';}
    else{btnU.classList.add('active');unsureNote.style.display='block';btnSub.style.display='block';}
  }

  btnSub.addEventListener('click',async function(){
    errEl.style.display='none';
    if(!state){errEl.textContent=t('err_select');errEl.style.display='block';return;}
    var periods=[];
    if(state==='close'){
      var ok=true;
      periodsEl.querySelectorAll('.period-block').forEach(function(bl){
        var s=bl.querySelector('[data-role=start]').value,e=bl.querySelector('[data-role=end]').value;
        if(!s||!e||s>=e)ok=false;else periods.push({start:s,end:e});
      });
      if(!ok||!periods.length){errEl.textContent=t('err_dates');errEl.style.display='block';return;}
    }
    btnSub.disabled=true;btnSub.textContent=t('sending');
    var cat=state==='close'?t('cat_close'):state==='open'?t('cat_open'):t('cat_unsure');
    var sub={state:state,periods:periods,category:cat};
    if(!IS_LOCAL){
      try{
        var rows=state==='close'?periods:[{start:'',end:''}];
        for(var i=0;i<rows.length;i++){
          var params=new URLSearchParams({point_id:pid,point_name:pt[1],email:userEmail,point_type:'APM',category:cat,state:state,closure_start:rows[i].start,closure_end:rows[i].end,closure_period:state==='close'?i+1:''});
          await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:params});
        }
      }catch(ex){errEl.textContent=t('err_send');errEl.style.display='block';btnSub.disabled=false;btnSub.textContent=t(isLast?'finish':'next');return;}
    }
    saveSub(userEmail,pid,sub);submissions[pid]=sub;
    if(isLast)showSummary();else showForm(idx+1);
  });
}

function showSummary(){
  app.innerHTML='';setDir();
  var icon=el('div','success-icon');icon.textContent='✓';app.appendChild(icon);
  app.appendChild(el('p','section-title',t('summary_title')));
  app.appendChild(el('p','section-sub',t('summary_sub')));
  var list=el('div','summary-list');
  selectedPoints.forEach(function(pid){
    var sub=submissions[pid]||loadSub(userEmail,pid);
    var pt=allPoints.filter(function(p){return p[0]===pid;})[0]||[pid,pid,'',''];
    var item=el('div','summary-item');
    var hdr=el('div','summary-item-header');
    hdr.appendChild(el('span','summary-item-name',pt[1]));
    var chipCls='chip '+(sub&&sub.state==='close'?'chip-red':sub&&sub.state==='open'?'chip-green':'chip-yellow');
    hdr.appendChild(el('span',chipCls,sub?sub.category:''));
    item.appendChild(hdr);
    var addr=(pt[3]||'')+(pt[2]?(pt[3]?', ':'')+pt[2]:'');
    if(addr)item.appendChild(el('p','summary-item-city',addr));
    if(sub&&sub.state==='close'&&sub.periods&&sub.periods.length){
      var detail=el('div','summary-item-detail');
      sub.periods.forEach(function(p,i){detail.appendChild(el('p',null,(sub.periods.length>1?t('period')+' '+(i+1)+': ':'')+fmt(p.start)+' → '+fmt(p.end)));});
      item.appendChild(detail);
    }
    list.appendChild(item);
  });
  app.appendChild(list);
  var btnMod=el('button','btn-secondary',t('modify_all'));
  btnMod.addEventListener('click',function(){submissions={};if(allPoints.length>1)showSelect();else showForm(0);});
  app.appendChild(btnMod);
}

try{showEmail();}catch(e){document.getElementById('app').innerHTML='<p style="padding:20px;color:#c00;font-size:14px">Error: '+e.message+'</p>';}
</script>
</body>
</html>
